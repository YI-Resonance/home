<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YI-Resonance 作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 20px;
        }

        .intro {
            color: #555;
            line-height: 1.8;
            font-size: 1em;
            margin: 30px 0;
            text-align: left;
        }

        .intro p {
            margin-bottom: 15px;
        }

        .cta-section {
            margin-top: 40px;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            cursor: pointer;
            margin: 10px;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .mandala-link {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .mandala-link:hover {
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.4);
        }

        .footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2em;
            }

            .subtitle {
                font-size: 1em;
            }

            .intro {
                font-size: 0.95em;
            }

            .cta-button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>YI-Resonance</h1>
            <p class="subtitle">歡迎來到我的作品集</p>
        </div>

        <div class="intro">
            <!-- 在下方填入你的自我介紹 -->
            <p>在這裡編輯你的自我介紹...</p>
            <p>你可以寫下你的職業、技能、興趣或任何你想分享的內容。</p>
        </div>

        <div class="cta-section">
            <p style="margin-bottom: 20px; color: #666;">探索我的作品：</p>
            <a href="https://github.com/YI-Resonance/mandala_chi" class="cta-button mandala-link">
                ✨ 我的曼陀羅 (Mandala)
            </a>
        </div>

        <div class="footer">
            <p>© 2026 YI-Resonance. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
